name: Dogfood

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  checks: write
  contents: read

jobs:
  ed-says:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package
      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: static-only
