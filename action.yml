name: "Ed Says - Epistemic Debt Analyzer"
description: "Measures epistemic debt per PR across Requirements, Specification, Implementation, and Validation levels"
author: "cnantoninor"

branding:
  icon: "book-open"
  color: "orange"

inputs:
  github-token:
    description: "GitHub token for API access (PR comments, check runs)"
    required: true
    default: ${{ github.token }}
  config-path:
    description: "Path to .ed-says.yml config file"
    required: false
    default: ".ed-says.yml"
  mode:
    description: "Analysis mode: static-only | full (includes LLMJ questions)"
    required: false
    default: "static-only"
  model-provider:
    description: "AI provider for LLMJ (openai, anthropic, ollama)"
    required: false
    default: "openai"
  model-id:
    description: "Model identifier (e.g. gpt-4o-mini, claude-sonnet-4-20250514)"
    required: false
    default: "gpt-4o-mini"
  ai-api-key:
    description: "API key for the AI provider (required when mode=full)"
    required: false
  fail-threshold:
    description: "Ed score above which the check fails (0 = never fail)"
    required: false
    default: "0"

outputs:
  debt-score:
    description: "Aggregate epistemic debt score for the PR"
  report-json:
    description: "Full JSON report (per-component, per-level breakdown)"
  debt-level:
    description: "Human-readable level: LOW | MEDIUM | HIGH | CRITICAL"

runs:
  using: "node20"
  main: "dist-action/index.js"
