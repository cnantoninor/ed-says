version: 1

components:
  - name: "payments"
    paths:
      - "src/domains/payments/**"
    subdomain: core
    bus_factor_threshold: 3
    owners:
      - "@payments-team"

  - name: "notifications"
    paths:
      - "src/services/notifications/**"
    subdomain: supporting
    bus_factor_threshold: 2

  - name: "shared-utils"
    paths:
      - "src/lib/**"
    subdomain: generic
    bus_factor_threshold: 1

thresholds:
  levels:
    requirements:
      weight: 1.0
      enabled: true
    specification:
      weight: 0.8
      enabled: true
    implementation:
      weight: 1.0
      enabled: true
    validation:
      weight: 0.6
      enabled: true
  severity:
    low: "0-25"
    medium: "26-50"
    high: "51-75"
    critical: "76+"

llmj:
  provider: openai
  model: gpt-4o-mini
  max_questions_per_level: 2
  temperature: 0.3

analyzers:
  complexity:
    engine: heuristic
    languages:
      - typescript
      - python
  coupling:
    enabled: true
    import_depth: 2

ledger:
  enabled: true
  path: .ed-says-ledger.json
  max_entries: 1000

output:
  comment: true
  check_run: true
  annotations: false
